name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          OUTPUT="claude-terminal-${GOOS}-${GOARCH}"
          go build -ldflags="-s -w" -o "${OUTPUT}" .
          chmod +x "${OUTPUT}"

      - uses: actions/upload-artifact@v4
        with:
          name: claude-terminal-${{ matrix.goos }}-${{ matrix.goarch }}
          path: claude-terminal-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir -p release
          find artifacts -type f -name 'claude-terminal-*' -exec cp {} release/ \;
          chmod +x release/*
          ls -lh release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
