<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Claude Terminal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background: #1e1e2e; color: #cdd6f4;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 16px; line-height: 1.4;
        }
        .container { max-width: 560px; margin: 0 auto; padding: 16px 16px 88px; }

        /* Header */
        .header {
            display: flex; align-items: center; gap: 12px;
            padding: 8px 0 16px; margin-bottom: 20px;
            border-bottom: 1px solid #313244;
        }
        .back-btn {
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            background: #313244; border: none; border-radius: 8px;
            color: #89b4fa; font-size: 20px; cursor: pointer; text-decoration: none;
        }
        .back-btn:active { background: #45475a; }
        .header h1 { font-size: 20px; font-weight: 600; }

        /* Section */
        .section { margin-bottom: 28px; }
        .section-title {
            font-size: 12px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.8px; color: #a6adc8; margin-bottom: 10px;
        }
        .card {
            background: #313244; border-radius: 12px;
            padding: 14px 16px; margin-bottom: 8px;
        }

        /* Toggle row */
        .toggle-row {
            display: flex; justify-content: space-between; align-items: center;
        }
        .toggle-label { font-size: 15px; font-weight: 500; }
        .toggle-desc { font-size: 12px; color: #a6adc8; margin-top: 2px; }
        .toggle { position: relative; width: 48px; height: 28px; flex-shrink: 0; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle .slider {
            position: absolute; inset: 0; background: #45475a;
            border-radius: 14px; cursor: pointer; transition: 0.2s;
        }
        .toggle .slider::before {
            content: ''; position: absolute; width: 22px; height: 22px;
            left: 3px; bottom: 3px; background: #cdd6f4;
            border-radius: 50%; transition: 0.2s;
        }
        .toggle input:checked + .slider { background: #89b4fa; }
        .toggle input:checked + .slider::before { transform: translateX(20px); }

        /* Number input */
        .num-ctrl { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .num-ctrl button {
            width: 38px; height: 38px; border-radius: 8px;
            background: #45475a; color: #cdd6f4; border: none;
            font-size: 18px; cursor: pointer; line-height: 1;
            touch-action: manipulation;
        }
        .num-ctrl button:active { background: #585b70; }
        .num-ctrl input {
            width: 48px; text-align: center; padding: 6px;
            background: #45475a; color: #cdd6f4; border: none;
            border-radius: 8px; font-size: 15px; outline: none;
        }

        /* Snippet card */
        .snippet-card {
            background: #313244; border-radius: 12px;
            padding: 14px 16px; margin-bottom: 8px;
            border: 2px solid transparent; transition: border-color 0.15s;
        }
        .snippet-card.dragging { opacity: 0.4; }
        .snippet-card.drag-over { border-color: #89b4fa; }
        .snippet-top {
            display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
        }
        .drag-handle {
            cursor: grab; color: #585b70; font-size: 18px;
            padding: 6px; user-select: none; touch-action: none;
            min-width: 32px; text-align: center;
        }
        .drag-handle:active { cursor: grabbing; color: #89b4fa; }
        .snippet-top input {
            flex: 1; min-width: 0; padding: 8px 10px; background: #45475a;
            color: #cdd6f4; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; outline: none;
        }
        .snippet-top input:focus { box-shadow: 0 0 0 1px #89b4fa; }
        .del-btn {
            padding: 8px 10px; background: none; border: none;
            color: #f38ba8; cursor: pointer; font-size: 18px; border-radius: 6px;
            min-width: 36px; text-align: center;
        }
        .del-btn:active { background: #45475a; }

        .field { margin-bottom: 10px; }
        .field:last-child { margin-bottom: 0; }
        .field-label { font-size: 11px; color: #a6adc8; margin-bottom: 4px; font-weight: 600; }
        .field textarea {
            width: 100%; padding: 8px 10px; background: #45475a;
            color: #cdd6f4; border: none; border-radius: 8px;
            font-size: 13px; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
            resize: vertical; min-height: 34px; outline: none; line-height: 1.4;
        }
        .field textarea:focus { box-shadow: 0 0 0 1px #89b4fa; }

        /* Color picker */
        .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
        .color-opt {
            width: 28px; height: 28px; border-radius: 50%;
            border: 2px solid transparent; cursor: pointer; transition: 0.15s;
        }
        .color-opt:hover { transform: scale(1.1); }
        .color-opt.selected { border-color: #cdd6f4; box-shadow: 0 0 0 1px #1e1e2e; }

        /* Confirm toggle */
        .confirm-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 10px; background: #45475a; border-radius: 8px;
        }
        .confirm-row span { font-size: 13px; color: #a6adc8; }
        .mini-toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
        .mini-toggle input { opacity: 0; width: 0; height: 0; }
        .mini-toggle .slider {
            position: absolute; inset: 0; background: #585b70;
            border-radius: 11px; cursor: pointer; transition: 0.2s;
        }
        .mini-toggle .slider::before {
            content: ''; position: absolute; width: 18px; height: 18px;
            left: 2px; bottom: 2px; background: #cdd6f4;
            border-radius: 50%; transition: 0.2s;
        }
        .mini-toggle input:checked + .slider { background: #f38ba8; }
        .mini-toggle input:checked + .slider::before { transform: translateX(18px); }

        /* Add btn */
        .add-btn {
            width: 100%; padding: 12px; background: transparent;
            color: #89b4fa; border: 1px dashed #45475a; border-radius: 12px;
            font-size: 15px; cursor: pointer; margin-top: 4px;
        }
        .add-btn:active { background: #313244; }

        /* Save bar */
        .save-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 12px 16px; background: #181825;
            border-top: 1px solid #313244;
            display: flex; justify-content: center;
        }
        .save-btn {
            width: 100%; max-width: 560px; padding: 14px;
            background: #89b4fa; color: #1e1e2e; border: none;
            border-radius: 10px; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: background 0.2s;
        }
        .save-btn:active { background: #74c7ec; }
        .save-btn.saved { background: #a6e3a1; }

        /* Toast */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #a6e3a1; color: #1e1e2e; padding: 10px 20px;
            border-radius: 8px; font-size: 14px; font-weight: 600;
            opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a class="back-btn" href="/">&larr;</a>
            <h1>Settings</h1>
        </div>

        <div class="section">
            <div class="section-title">General</div>
            <div class="card">
                <div class="toggle-row">
                    <div>
                        <div class="toggle-label">Wake Lock</div>
                        <div class="toggle-desc">화면 자동 꺼짐 방지</div>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" id="opt-wakeLock">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="card">
                <div class="toggle-row">
                    <div>
                        <div class="toggle-label">Font Size</div>
                        <div class="toggle-desc">입력창 글자 크기</div>
                    </div>
                    <div class="num-ctrl">
                        <button onclick="adjustFont(-1)">&minus;</button>
                        <input type="number" id="opt-fontSize" min="10" max="28" value="16">
                        <button onclick="adjustFont(1)">+</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Snippets</div>
            <div id="snippet-list"></div>
            <button class="add-btn" onclick="addSnippet()">+ Add Snippet</button>
        </div>
    </div>

    <div class="save-bar">
        <button class="save-btn" id="save-btn" onclick="saveSettings()">Save</button>
    </div>
    <div class="toast" id="toast">Saved!</div>

    <script>
    (function() {
        var COLORS = {
            'default': '#585b70',
            'green':   '#a6e3a1',
            'blue':    '#89b4fa',
            'red':     '#f38ba8',
            'yellow':  '#f9e2af',
            'purple':  '#cba6f7',
            'teal':    '#94e2d5'
        };
        var COLOR_NAMES = Object.keys(COLORS);
        var settings = { general: { wakeLock: false, fontSize: 16 }, snippets: [] };
        var dragSrcIdx = null;

        // --- Load ---
        fetch('/api/settings')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                settings = data;
                applyToUI();
            })
            .catch(function() { applyToUI(); });

        function applyToUI() {
            document.getElementById('opt-wakeLock').checked = settings.general.wakeLock;
            document.getElementById('opt-fontSize').value = settings.general.fontSize;
            renderSnippets();
        }

        // --- Font size ---
        window.adjustFont = function(d) {
            var el = document.getElementById('opt-fontSize');
            var v = parseInt(el.value) + d;
            if (v >= 10 && v <= 28) el.value = v;
        };

        // --- Render snippets ---
        function renderSnippets() {
            var list = document.getElementById('snippet-list');
            list.innerHTML = '';
            settings.snippets.forEach(function(sn, i) {
                var card = document.createElement('div');
                card.className = 'snippet-card';
                card.draggable = true;
                card.dataset.idx = i;

                // Color options
                var colorHtml = COLOR_NAMES.map(function(c) {
                    return '<div class="color-opt' + (sn.color === c ? ' selected' : '') +
                        '" style="background:' + COLORS[c] + '" data-color="' + c + '"></div>';
                }).join('');

                card.innerHTML =
                    '<div class="snippet-top">' +
                        '<span class="drag-handle">&#x2630;</span>' +
                        '<input type="text" value="' + escAttr(sn.label) + '" placeholder="Label" data-field="label">' +
                        '<button class="del-btn" data-action="delete">&times;</button>' +
                    '</div>' +
                    '<div class="field">' +
                        '<div class="field-label">Command</div>' +
                        '<textarea rows="1" data-field="command" placeholder="command...">' + escHtml(sn.command) + '</textarea>' +
                    '</div>' +
                    '<div class="field">' +
                        '<div class="field-label">Color</div>' +
                        '<div class="color-picker" data-field="color">' + colorHtml + '</div>' +
                    '</div>' +
                    '<div class="field">' +
                        '<div class="confirm-row">' +
                            '<span>실행 전 확인</span>' +
                            '<label class="mini-toggle">' +
                                '<input type="checkbox"' + (sn.confirm ? ' checked' : '') + ' data-field="confirm">' +
                                '<span class="slider"></span>' +
                            '</label>' +
                        '</div>' +
                    '</div>';

                // Auto-resize textarea
                var ta = card.querySelector('textarea');
                ta.addEventListener('input', function() { autoResize(this); });
                setTimeout(function() { autoResize(ta); }, 0);

                // Event delegation
                card.addEventListener('input', function(e) { onFieldChange(i, e); });
                card.addEventListener('click', function(e) { onCardClick(i, e); });

                // Drag events
                card.addEventListener('dragstart', function(e) { onDragStart(i, e); });
                card.addEventListener('dragover', function(e) { onDragOver(i, e); });
                card.addEventListener('dragleave', function(e) { card.classList.remove('drag-over'); });
                card.addEventListener('drop', function(e) { onDrop(i, e); });
                card.addEventListener('dragend', function() { card.classList.remove('dragging'); dragSrcIdx = null; });

                // Touch drag
                var handle = card.querySelector('.drag-handle');
                handle.addEventListener('touchstart', function(e) { onTouchDragStart(i, e, card); }, { passive: false });

                list.appendChild(card);
            });
        }

        function autoResize(ta) {
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';
        }

        function onFieldChange(idx, e) {
            var el = e.target;
            var field = el.dataset.field;
            if (!field) return;
            if (field === 'label') settings.snippets[idx].label = el.value;
            else if (field === 'command') settings.snippets[idx].command = el.value;
            else if (field === 'confirm') settings.snippets[idx].confirm = el.checked;
        }

        function onCardClick(idx, e) {
            var t = e.target;
            if (t.dataset.action === 'delete') {
                settings.snippets.splice(idx, 1);
                renderSnippets();
            }
            if (t.dataset.color !== undefined) {
                settings.snippets[idx].color = t.dataset.color;
                t.parentElement.querySelectorAll('.color-opt').forEach(function(o) { o.classList.remove('selected'); });
                t.classList.add('selected');
            }
        }

        // --- Drag & Drop ---
        function onDragStart(idx, e) {
            dragSrcIdx = idx;
            e.target.closest('.snippet-card').classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }
        function onDragOver(idx, e) {
            if (dragSrcIdx === null || dragSrcIdx === idx) return;
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            e.target.closest('.snippet-card').classList.add('drag-over');
        }
        function onDrop(idx, e) {
            e.preventDefault();
            e.target.closest('.snippet-card').classList.remove('drag-over');
            if (dragSrcIdx === null || dragSrcIdx === idx) return;
            var moved = settings.snippets.splice(dragSrcIdx, 1)[0];
            settings.snippets.splice(idx, 0, moved);
            dragSrcIdx = null;
            renderSnippets();
        }

        // --- Touch drag (mobile) ---
        var touchState = null;
        function onTouchDragStart(idx, e, card) {
            e.preventDefault();
            var touch = e.touches[0];
            var rect = card.getBoundingClientRect();
            touchState = { idx: idx, card: card, offsetY: touch.clientY - rect.top, clone: null };
            card.classList.add('dragging');

            var clone = card.cloneNode(true);
            clone.style.cssText = 'position:fixed;left:16px;right:16px;width:' + rect.width + 'px;z-index:50;pointer-events:none;opacity:0.8;';
            clone.style.top = rect.top + 'px';
            document.body.appendChild(clone);
            touchState.clone = clone;

            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', onTouchEnd);
        }
        function onTouchMove(e) {
            if (!touchState) return;
            e.preventDefault();
            var y = e.touches[0].clientY;
            touchState.clone.style.top = (y - touchState.offsetY) + 'px';

            // Highlight target
            var cards = document.querySelectorAll('.snippet-card');
            cards.forEach(function(c, i) {
                var r = c.getBoundingClientRect();
                if (y > r.top && y < r.bottom && i !== touchState.idx) {
                    c.classList.add('drag-over');
                } else {
                    c.classList.remove('drag-over');
                }
            });
        }
        function onTouchEnd(e) {
            if (!touchState) return;
            document.removeEventListener('touchmove', onTouchMove);
            document.removeEventListener('touchend', onTouchEnd);
            if (touchState.clone) touchState.clone.remove();

            var y = e.changedTouches[0].clientY;
            var cards = document.querySelectorAll('.snippet-card');
            var targetIdx = -1;
            cards.forEach(function(c, i) {
                var r = c.getBoundingClientRect();
                if (y > r.top && y < r.bottom && i !== touchState.idx) targetIdx = i;
                c.classList.remove('drag-over');
            });

            touchState.card.classList.remove('dragging');
            if (targetIdx >= 0 && targetIdx !== touchState.idx) {
                var moved = settings.snippets.splice(touchState.idx, 1)[0];
                settings.snippets.splice(targetIdx, 0, moved);
                renderSnippets();
            }
            touchState = null;
        }

        // --- Add snippet ---
        window.addSnippet = function() {
            settings.snippets.push({
                id: 's' + Date.now(),
                label: '',
                command: '',
                color: 'default',
                confirm: false
            });
            renderSnippets();
            // Focus the new label input
            var cards = document.querySelectorAll('.snippet-card');
            var last = cards[cards.length - 1];
            if (last) last.querySelector('input[data-field="label"]').focus();
        };

        // --- Save ---
        window.saveSettings = function() {
            settings.general.wakeLock = document.getElementById('opt-wakeLock').checked;
            settings.general.fontSize = parseInt(document.getElementById('opt-fontSize').value) || 16;

            var btn = document.getElementById('save-btn');
            btn.textContent = 'Saving...';
            btn.disabled = true;

            fetch('/api/settings', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(settings)
            })
            .then(function(r) { return r.json(); })
            .then(function() {
                btn.textContent = 'Saved!';
                btn.classList.add('saved');
                showToast('Saved!');
                setTimeout(function() {
                    btn.textContent = 'Save';
                    btn.classList.remove('saved');
                    btn.disabled = false;
                }, 1500);
            })
            .catch(function() {
                btn.textContent = 'Error';
                btn.disabled = false;
                setTimeout(function() { btn.textContent = 'Save'; }, 2000);
            });
        };

        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 2000);
        }

        function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
        function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    })();
    </script>
</body>
</html>
