        // --- Notification polling (main thread) ---
        var notifyPollTimer = null;
        var notifySince = Date.now();
        var notifyEnabled = false;

        function notifyPoll() {
            fetch('/api/notifications?since=' + notifySince, { credentials: 'same-origin' })
                .then(function(r) { return r.ok ? r.json() : null; })
                .then(function(d) {
                    if (!d || !d.notifications || d.notifications.length === 0) return;
                    d.notifications.forEach(function(n) {
                        if (n.ts > notifySince) notifySince = n.ts;
                    });
                    var latest = d.notifications[d.notifications.length - 1];
                    var sessionLabel = latest.session || '';
                    if (latest.window) sessionLabel += ':' + latest.window;
                    var body = '[' + sessionLabel + '] ' + (latest.message || 'Done');
                    if (document.visibilityState === 'hidden') {
                        if ('Notification' in window && Notification.permission === 'granted') {
                            try {
                                var notif = new Notification('Claude Terminal', {
                                    body: body,
                                    icon: '/icon-192.png',
                                    tag: 'claude-notify-' + latest.ts,
                                    renotify: true
                                });
                                notif.onclick = function() {
                                    window.focus();
                                    notif.close();
                                };
                            } catch(e) {}
                        }
                    } else {
                        showToast(body, 2000);
                    }
                })
                .catch(function() {});
        }

        function startNotifyPolling() {
            if (!notifyEnabled || notifyPollTimer) return;
            notifySince = Date.now();
            notifyPoll();
            notifyPollTimer = setInterval(notifyPoll, 3000);
        }

        function stopNotifyPolling() {

        // --- Keyboard resize handling (iOS Safari fallback) ---

        // ========================================

        // --- A. Open / Close ---

        document.getElementById('sh-wakeLock').addEventListener('change', function() {
            shSettings.general.wakeLock = this.checked;

        document.getElementById('sh-notification').addEventListener('change', function() {
            var toggle = this;

                if (!('Notification' in window)) {
                    toggle.checked = false;
                    showToast('이 브라우저는 알림을 지원하지 않습니다');
                    return;

                Notification.requestPermission().then(function(perm) {
                    if (perm === 'granted') {
                        shSettings.general.notification = true;
                        showToast('알림이 활성화되었습니다');
                    } else {
                        toggle.checked = false;
                        shSettings.general.notification = false;
                        showToast('알림 권한이 거부되었습니다');

                shSettings.general.notification = false;

        // --- D. Snippet management ---
        var shDragSrcIdx = null;
        var shTouchState = null;

        function renderSettingsSnippets() {
            var list = document.getElementById('sh-snippet-list');
            list.innerHTML = '';
            (shSettings.snippets || []).forEach(function(sn, i) {
                var card = document.createElement('div');
                card.className = 'sn-card';
                card.draggable = true;
                card.dataset.idx = i;

                var colorHtml = SH_COLOR_NAMES.map(function(c) {
                    return '<div class="sn-color-opt' + (sn.color === c ? ' selected' : '') +
                        '" style="background:' + SH_COLORS[c] + '" data-color="' + c + '"></div>';
                }).join('');

                card.innerHTML =
                    '<div class="sn-top">' +
                        '<span class="sn-handle">&#x2630;</span>' +
                        '<input type="text" value="' + escAttr(sn.label) + '" placeholder="Label" data-field="label">' +
                        '<button class="sn-del" data-action="delete">&times;</button>' +
                    '</div>' +
                    '<div class="sn-field">' +
                        '<div class="sn-field-label">Command</div>' +
                        '<textarea rows="1" data-field="command" placeholder="command...">' + escHtml(sn.command) + '</textarea>' +
                    '</div>' +
                    '<div class="sn-field">' +
                        '<div class="sn-field-label">Color</div>' +
                        '<div class="sn-colors" data-field="color">' + colorHtml + '</div>' +
                    '</div>' +
                    '<div class="sn-field">' +
                        '<div class="sn-confirm-row">' +
                            '<span>실행 전 확인</span>' +
                            '<label class="sn-mini-toggle">' +
                                '<input type="checkbox"' + (sn.confirm ? ' checked' : '') + ' data-field="confirm">' +
                                '<div class="mt-track"></div>' +
                                '<div class="mt-thumb"></div>' +
                            '</label>' +
                        '</div>' +
                        '<div class="sn-confirm-row" style="margin-top:8px">' +
                            '<span>새 창에서 실행</span>' +
                            '<label class="sn-mini-toggle">' +
                                '<input type="checkbox"' + (sn.newWindow ? ' checked' : '') + ' data-field="newWindow">' +
                                '<div class="mt-track"></div>' +
                                '<div class="mt-thumb"></div>' +
                            '</label>' +
                        '</div>' +
                    '</div>';

                // Auto-resize textarea
                var ta = card.querySelector('textarea');
                ta.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = this.scrollHeight + 'px';
                });
                setTimeout(function() { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }, 0);

                // Field changes
                card.addEventListener('input', function(e) {
                    var el = e.target; var field = el.dataset.field;
                    if (!field) return;
                    if (field === 'label') shSettings.snippets[i].label = el.value;
                    else if (field === 'command') shSettings.snippets[i].command = el.value;
                    else if (field === 'confirm') shSettings.snippets[i].confirm = el.checked;
                    else if (field === 'newWindow') shSettings.snippets[i].newWindow = el.checked;
                });

                // Click delegation (delete, color)
                card.addEventListener('click', function(e) {
                    var t = e.target;
                    if (t.dataset.action === 'delete') {
                        shSettings.snippets.splice(i, 1);
                        renderSettingsSnippets();
                    }
                    if (t.dataset.color !== undefined) {
                        shSettings.snippets[i].color = t.dataset.color;
                        t.parentElement.querySelectorAll('.sn-color-opt').forEach(function(o) { o.classList.remove('selected'); });
                        t.classList.add('selected');
                    }
                });

                // Desktop drag
                card.addEventListener('dragstart', function(e) {
                    shDragSrcIdx = i;
                    card.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });
                card.addEventListener('dragover', function(e) {
                    if (shDragSrcIdx === null || shDragSrcIdx === i) return;
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    card.classList.add('drag-over');
                });
                card.addEventListener('dragleave', function() { card.classList.remove('drag-over'); });
                card.addEventListener('drop', function(e) {
                    e.preventDefault();
                    card.classList.remove('drag-over');
                    if (shDragSrcIdx === null || shDragSrcIdx === i) return;
                    var moved = shSettings.snippets.splice(shDragSrcIdx, 1)[0];
                    shSettings.snippets.splice(i, 0, moved);
                    shDragSrcIdx = null;
                    renderSettingsSnippets();
                });
                card.addEventListener('dragend', function() { card.classList.remove('dragging'); shDragSrcIdx = null; });

                // Mobile touch drag
                var handle = card.querySelector('.sn-handle');
                handle.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    var touch = e.touches[0];
                    var rect = card.getBoundingClientRect();
                    shTouchState = { idx: i, card: card, offsetY: touch.clientY - rect.top, clone: null };
                    card.classList.add('dragging');

                    var clone = card.cloneNode(true);
                    clone.style.cssText = 'position:fixed;left:16px;right:16px;width:' + rect.width + 'px;z-index:200;pointer-events:none;opacity:0.8;';
                    clone.style.top = rect.top + 'px';
                    document.body.appendChild(clone);
                    shTouchState.clone = clone;

                    document.addEventListener('touchmove', shOnTouchMove, { passive: false });
                    document.addEventListener('touchend', shOnTouchEnd);
                }, { passive: false });

                list.appendChild(card);
            });
        }

        function shOnTouchMove(e) {
            if (!shTouchState) return;
            e.preventDefault();
            var y = e.touches[0].clientY;
            shTouchState.clone.style.top = (y - shTouchState.offsetY) + 'px';
            document.querySelectorAll('.sn-card').forEach(function(c, ci) {
                var r = c.getBoundingClientRect();
                if (y > r.top && y < r.bottom && ci !== shTouchState.idx) {
                    c.classList.add('drag-over');
                } else {
                    c.classList.remove('drag-over');
                }
            });
        }

        function shOnTouchEnd(e) {
            if (!shTouchState) return;
            document.removeEventListener('touchmove', shOnTouchMove);
            document.removeEventListener('touchend', shOnTouchEnd);
            if (shTouchState.clone) shTouchState.clone.remove();

            var y = e.changedTouches[0].clientY;
            var targetIdx = -1;
            document.querySelectorAll('.sn-card').forEach(function(c, ci) {
                var r = c.getBoundingClientRect();
                if (y > r.top && y < r.bottom && ci !== shTouchState.idx) targetIdx = ci;
                c.classList.remove('drag-over');
            });

            shTouchState.card.classList.remove('dragging');
            if (targetIdx >= 0 && targetIdx !== shTouchState.idx) {
                var moved = shSettings.snippets.splice(shTouchState.idx, 1)[0];
                shSettings.snippets.splice(targetIdx, 0, moved);
                renderSettingsSnippets();
            }
            shTouchState = null;
        }

        // Add snippet

    // --- Copy Mode ---
    (function() {
        var overlay = document.getElementById('copy-overlay');
        var textArea = document.getElementById('copy-text-area');
        var statusText = document.getElementById('copy-status-text');
        var copyAllBtn = document.getElementById('copy-all-btn');
        var copyCloseBtn = document.getElementById('copy-close-btn');
        var copyHistoryBtn = document.getElementById('copy-history-btn');
        var copyModeBtn = document.getElementById('copy-mode-btn');
        var showingHistory = false;

        function openCopyMode(history) {
            showingHistory = !!history;
            overlay.classList.add('open');
            textArea.value = '로딩 중...';
            statusText.textContent = '터미널 내용을 가져오는 중...';
            statusText.className = '';
            copyHistoryBtn.textContent = showingHistory ? '현재 화면' : '스크롤백';

            var url = '/api/tmux-capture' + (history ? '?history=1' : '');
            fetch(url, { credentials: 'same-origin' })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    textArea.value = data.text || '(빈 화면)';
                    statusText.textContent = '텍스트를 선택한 후 복사하세요 (전체 복사 버튼도 가능)';
                    // Auto-scroll to bottom for history mode
                    if (history) {
                        textArea.scrollTop = textArea.scrollHeight;
                    }
                })
                .catch(function(e) {
                    textArea.value = 'Error: ' + e.message;
                    statusText.textContent = '오류 발생';
                });
        }

        function closeCopyMode() {
            overlay.classList.remove('open');
            textArea.value = '';
        }

        copyModeBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            openCopyMode(false);
        });

        copyCloseBtn.addEventListener('click', closeCopyMode);

        copyHistoryBtn.addEventListener('click', function() {
            openCopyMode(!showingHistory);
        });

        copyAllBtn.addEventListener('click', function() {
            var text = textArea.value;
            if (!text) return;

            // Try Clipboard API first
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() {
                    statusText.textContent = '클립보드에 복사됨!';
                    statusText.className = 'success';
                }).catch(function() {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        });

        function fallbackCopy(text) {
            textArea.readOnly = false;
            textArea.select();
            textArea.setSelectionRange(0, text.length);
            try {
                document.execCommand('copy');
                statusText.textContent = '클립보드에 복사됨!';
                statusText.className = 'success';
            } catch (e) {
                statusText.textContent = '자동 복사 실패 — 텍스트를 길게 눌러서 직접 복사하세요';
                statusText.className = '';
            }
            textArea.readOnly = true;
        }

        // Close on Escape
        overlay.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeCopyMode();
        });
    })();

    // ===================== Pull to Refresh =====================
    function setupPullToRefresh(scrollEl, onRefresh) {
        var indicator = document.createElement('div');
        indicator.className = 'ptr-indicator';
        indicator.setAttribute('data-ptr', '1');
        scrollEl.insertBefore(indicator, scrollEl.firstChild);

        var startY = 0, active = false, pulling = false, refreshing = false, threshold = 55;

        scrollEl.addEventListener('touchstart', function(e) {
            if (refreshing) return;
            if (scrollEl.scrollTop <= 0) {
                startY = e.touches[0].clientY;
                active = true;
                pulling = false;
            }
        }, { passive: true });

        // Non-passive: allows preventDefault to block native overscroll
        scrollEl.addEventListener('touchmove', function(e) {
            if (!active || refreshing) return;
            var dy = e.touches[0].clientY - startY;
            if (dy <= 5) {
                // Scrolling up or barely moved — let native handle
                if (pulling) {
                    indicator.style.height = '0';
                    pulling = false;
                }
                return;
            }
            // Only intercept if at the very top
            if (scrollEl.scrollTop > 0) {
                active = false;
                return;
            }
            // We're pulling down from the top — prevent native scroll
            e.preventDefault();
            pulling = true;
            var h = Math.min(Math.pow(dy, 0.7), 80);
            indicator.style.height = h + 'px';
            indicator.classList.add('pulling');
            indicator.textContent = h >= threshold ? '놓으면 새로고침' : '↓ 당겨서 새로고침';
        }, { passive: false });

        scrollEl.addEventListener('touchend', function() {
            if (!active && !pulling) return;
            active = false;
            if (!pulling) return;
            pulling = false;
            indicator.classList.remove('pulling');
            var h = parseFloat(indicator.style.height) || 0;
            if (h >= threshold) {
                refreshing = true;
                indicator.innerHTML = '<span class="ptr-spinner"></span>새로고침 중...';
                indicator.classList.add('refreshing');
                onRefresh(function() {
                    refreshing = false;
                    indicator.classList.remove('refreshing');
                    indicator.style.height = '0';
                    indicator.innerHTML = '';
                });
            } else {
                indicator.style.height = '0';
                indicator.innerHTML = '';
            }
        }, { passive: true });
    }

    // ===================== Dashboard =====================
    (function() {
        var scrollEl = document.getElementById('dash-scroll');
        var contentEl = document.getElementById('dash-content');
        var lastDashLoad = 0;

        window.loadDashboard = function(done) {
            if (!done && Date.now() - lastDashLoad < 3000 && contentEl.innerHTML) {
                return;
            }
            lastDashLoad = Date.now();
            Promise.all([
                fetch('/api/git-status', { credentials: 'same-origin' }).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; }),
                fetch('/api/server-status', { credentials: 'same-origin' }).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; })
            ]).then(function(results) {
                var usage = window._cachedUsageData || null;
                var git = results[0];
                var server = results[1];
                contentEl.innerHTML = renderUsageSection(usage) + renderGitSection(git) + renderServerSection(server);
                var toggleBtn = contentEl.querySelector('.git-files-toggle');
                if (toggleBtn) {
                    toggleBtn.addEventListener('click', function() {
                        var sec = contentEl.querySelector('.git-files-section');
                        if (sec) {
                            var open = sec.classList.toggle('open');
                            toggleBtn.textContent = open ? '▲ 파일 숨기기' : '▼ 변경 파일 보기';
                        }
                    });
                }
                if (done) done();
            });
        };

        // Pull to refresh for Dash
        setupPullToRefresh(scrollEl, function(done) {
            lastDashLoad = 0;
            loadDashboard(done);
        });

        function renderUsageSection(data) {
            var html = '<div class="dash-section">';
            html += '<div class="dash-section-title"><span>⚡</span> Claude Usage</div>';
            if (!data || data.error || !data.five_hour) {
                var errMsg = (data && data.error && data.error.indexOf('429') !== -1)
                    ? 'Rate limited — 잠시 후 자동 갱신됩니다'
                    : '사용량 정보 대기 중...';
                html += '<div class="dash-empty">' + errMsg + '</div>';
                return html + '</div>';
            }
            var pct = Math.round(data.five_hour.utilization);
            var resetAt = new Date(data.five_hour.resets_at);
            var diffMs = resetAt - Date.now();
            var timeStr = '';
            if (diffMs > 0) {
                var totalMin = Math.floor(diffMs / 60000);
                var h = Math.floor(totalMin / 60);
                var m = totalMin % 60;
                timeStr = h > 0 ? h + 'h ' + m + 'm' : m + 'm';
            } else {
                timeStr = 'resetting...';
            }
            var barColor = pct >= 80 ? '#ff6b6b' : pct >= 50 ? '#e8b84b' : '#8ab563';

            html += '<div class="usage-card">';
            html += '<div class="usage-header">';
            html += '<div class="usage-pct">' + pct + '%<small> used</small></div>';
            html += '<div class="usage-reset">리셋 ' + timeStr + '</div>';
            html += '</div>';
            html += '<div class="usage-bar-bg"><div class="usage-bar-fill" style="width:' + pct + '%;background:' + barColor + '"></div></div>';

            // Daily/monthly if available
            if (data.daily) {
                var dPct = Math.round(data.daily.utilization);
                html += '<div class="usage-daily-row">';
                html += '<div class="usage-daily-item"><div class="usage-daily-label">5H WINDOW</div><div class="usage-daily-val">' + pct + '%</div></div>';
                html += '<div class="usage-daily-item"><div class="usage-daily-label">DAILY</div><div class="usage-daily-val">' + dPct + '%</div></div>';
                if (data.weekly) {
                    var wPct = Math.round(data.weekly.utilization);
                    html += '<div class="usage-daily-item"><div class="usage-daily-label">WEEKLY</div><div class="usage-daily-val">' + wPct + '%</div></div>';
                }
                html += '</div>';
            }
            html += '</div></div>';
            return html;
        }

        function esc(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function renderGitSection(git) {
            var html = '<div class="dash-section">';
            html += '<div class="dash-section-title"><span>📦</span> Git Status</div>';
            if (!git || git.error) {
                html += '<div class="dash-empty">Git 정보를 불러올 수 없습니다</div>';
                return html + '</div>';
            }
            html += '<div class="git-card">';
            // Branch row
            html += '<div class="git-branch-row">';
            html += '<span class="git-branch-icon">🌿</span>';
            html += '<span class="git-branch-name">' + esc(git.branch || 'detached') + '</span>';
            if (git.ahead > 0) html += '<span class="git-badge ahead">↑' + git.ahead + '</span>';
            if (git.behind > 0) html += '<span class="git-badge behind">↓' + git.behind + '</span>';
            if (git.changes && git.changes.total === 0) html += '<span class="git-badge clean">✓ clean</span>';
            html += '</div>';

            // Changes summary
            if (git.changes && git.changes.total > 0) {
                var c = git.changes;
                html += '<div class="git-changes-row">';
                html += '<div class="git-change-item"><div class="git-change-num" style="color:#8ab563">' + c.staged + '</div><div class="git-change-label">Staged</div></div>';
                html += '<div class="git-change-item"><div class="git-change-num" style="color:#e8b84b">' + c.unstaged + '</div><div class="git-change-label">Modified</div></div>';
                html += '<div class="git-change-item"><div class="git-change-num" style="color:#6a6158">' + c.untracked + '</div><div class="git-change-label">Untracked</div></div>';
                html += '</div>';

                // File list (collapsed)
                if (git.files && git.files.length > 0) {
                    html += '<div class="git-files-section">';
                    git.files.forEach(function(line) {
                        var st = line.substring(0, 2).trim() || '?';
                        var fname = line.substring(3);
                        var stClass = st.replace(/[^A-Z?]/g, '').charAt(0);
                        if (stClass === '?') stClass = 'U';
                        html += '<div class="git-file-row"><span class="git-file-status ' + stClass + '">' + esc(st) + '</span><span class="git-file-name">' + esc(fname) + '</span></div>';
                    });
                    html += '</div>';
                    html += '<button class="git-files-toggle">▼ 변경 파일 보기</button>';
                }
            }

            // Recent commits
            if (git.commits && git.commits.length > 0) {
                html += '<div class="git-commit-list">';
                git.commits.forEach(function(c) {
                    html += '<div class="git-commit-item">';
                    html += '<span class="git-commit-hash">' + esc(c.hash) + '</span>';
                    html += '<span class="git-commit-msg">' + esc(c.message) + '</span>';
                    html += '<span class="git-commit-ago">' + esc(c.ago) + '</span>';
                    html += '</div>';
                });
                html += '</div>';
            }
            html += '</div></div>';
            return html;
        }

        function renderServerSection(s) {
            if (!s) return '';
            var html = '<div class="dash-section">';
            html += '<div class="dash-section-title"><span>🖥</span> Server</div>';
            html += '<div class="usage-card"><div class="usage-daily-row">';
            if (s.cpu != null) html += '<div class="usage-daily-item"><div class="usage-daily-label">CPU</div><div class="usage-daily-val" style="color:' + (s.cpu >= 80 ? '#ff6b6b' : '#e8e6e3') + '">' + s.cpu + '%</div></div>';
            if (s.mem != null) html += '<div class="usage-daily-item"><div class="usage-daily-label">MEM</div><div class="usage-daily-val" style="color:' + (s.mem >= 80 ? '#ff6b6b' : '#e8e6e3') + '">' + s.memUsedGB + '/' + s.memTotalGB + 'G</div></div>';
            if (s.disk != null) html += '<div class="usage-daily-item"><div class="usage-daily-label">DISK</div><div class="usage-daily-val">' + s.disk + '%</div></div>';
            if (s.temp != null) html += '<div class="usage-daily-item"><div class="usage-daily-label">TEMP</div><div class="usage-daily-val" style="color:' + (s.temp >= 70 ? '#ff6b6b' : s.temp >= 55 ? '#e8b84b' : '#e8e6e3') + '">' + s.temp + '°C</div></div>';
            html += '</div></div></div>';
            return html;
        }
    })();

    // ===================== Brain (Claude Code Memory) =====================
    (function() {
        var treeView = document.getElementById('brain-tree-view');
        var editorView = document.getElementById('brain-editor-view');
        var treeItems = document.getElementById('brain-tree-items');
        var refreshBtn = document.getElementById('brain-refresh-btn');
        var backBtn = document.getElementById('brain-back-btn');
        var fileTitle = document.getElementById('brain-file-title');
        var editToggle = document.getElementById('brain-edit-toggle');
        var rendered = document.getElementById('brain-rendered');
        var textarea = document.getElementById('brain-textarea');
        var editorFooter = document.getElementById('brain-editor-footer');
        var editorStatus = document.getElementById('brain-editor-status');
        var sendClaudeBtn = document.getElementById('brain-send-claude-btn');

        // Expose for switchView
        window.brainTreeView = treeView;
        window.brainEditorView = editorView;

        var brainData = null;
        var currentFile = null; // {dir, file, writable}
        var isEditing = false;
        var saveTimer = null;

        var CAT_ICONS = {
            memory: '🧠', skills: '⚡', agents: '🤖', rules: '📏', hooks: '🪝'
        };

        window.loadBrainTree = function(done) {
            fetch('/api/brain', { credentials: 'same-origin' })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    brainData = data.scopes || [];
                    renderTree();
                    if (done) done();
                })
                .catch(function() {
                    var p = treeItems.querySelector('[data-ptr]');
                    treeItems.innerHTML = '<div style="padding:40px 16px;text-align:center;color:#4a4538">로드 실패</div>';
                    if (p) treeItems.insertBefore(p, treeItems.firstChild);
                    if (done) done();
                });
        };

        refreshBtn.addEventListener('click', function() { loadBrainTree(); });

        setupPullToRefresh(treeItems, function(done) {
            loadBrainTree(done);
        });

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + 'B';
            return (bytes / 1024).toFixed(1) + 'KB';
        }

        function renderTree() {
            // Preserve PTR indicator before clearing
            var ptr = treeItems.querySelector('[data-ptr]');
            treeItems.innerHTML = '';
            if (ptr) treeItems.insertBefore(ptr, treeItems.firstChild);
            brainData.forEach(function(scope) {
                if (!scope.categories.length) return;
                var label = document.createElement('div');
                label.className = 'brain-scope-label';
                label.textContent = scope.label;
                treeItems.appendChild(label);

                scope.categories.forEach(function(cat) {
                    var catEl = document.createElement('div');
                    catEl.className = 'brain-cat';
                    catEl.innerHTML =
                        '<span class="brain-cat-icon">' + (CAT_ICONS[cat.name] || '📄') + '</span>' +
                        '<span class="brain-cat-name">' + cat.name + '</span>' +
                        '<span class="brain-cat-count">' + cat.files.length + '</span>' +
                        '<span class="brain-cat-arrow">▶</span>';
                    treeItems.appendChild(catEl);

                    var filesEl = document.createElement('div');
                    filesEl.className = 'brain-files';
                    cat.files.forEach(function(f) {
                        var item = document.createElement('div');
                        item.className = 'brain-file-item';
                        item.innerHTML =
                            '<span class="brain-file-name">' + escapeHtml(f.name) + '</span>' +
                            '<span class="brain-file-size">' + formatSize(f.size) + '</span>';
                        item.addEventListener('click', function() {
                            openBrainFile(cat.dir, f.name);
                        });
                        filesEl.appendChild(item);
                    });
                    treeItems.appendChild(filesEl);

                    catEl.addEventListener('click', function() {
                        var open = filesEl.classList.toggle('open');
                        catEl.querySelector('.brain-cat-arrow').textContent = open ? '▼' : '▶';
                    });
                });
            });
        }

        function openBrainFile(dir, file) {
            var url = '/api/brain/read?dir=' + encodeURIComponent(dir) + '&file=' + encodeURIComponent(file);
            fetch(url, { credentials: 'same-origin' })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    currentFile = { dir: dir, file: file, writable: data.writable };
                    fileTitle.textContent = file;
                    textarea.value = data.content || '';
                    rendered.innerHTML = renderMarkdown(data.content || '');
                    // Reset to view mode
                    isEditing = false;
                    editToggle.textContent = '편집';
                    editToggle.classList.remove('editing');
                    editToggle.style.display = data.writable ? '' : 'none';
                    rendered.style.display = '';
                    textarea.style.display = 'none';
                    editorFooter.style.display = 'none';
                    editorStatus.textContent = '';
                    // Switch views
                    treeView.style.display = 'none';
                    editorView.style.display = 'flex';
                });
        }

        editToggle.addEventListener('click', function() {
            isEditing = !isEditing;
            if (isEditing) {
                editToggle.textContent = '미리보기';
                editToggle.classList.add('editing');
                rendered.style.display = 'none';
                textarea.style.display = 'block';
                editorFooter.style.display = 'flex';
                textarea.focus();
            } else {
                editToggle.textContent = '편집';
                editToggle.classList.remove('editing');
                rendered.innerHTML = renderMarkdown(textarea.value);
                rendered.style.display = '';
                textarea.style.display = 'none';
                editorFooter.style.display = 'none';
            }
        });

        textarea.addEventListener('input', function() {
            editorStatus.textContent = '수정됨';
            editorStatus.classList.remove('saved');
            clearTimeout(saveTimer);
            saveTimer = setTimeout(saveBrainFile, 1500);
        });

        function saveBrainFile() {
            if (!currentFile) return;
            editorStatus.textContent = '저장 중...';
            fetch('/api/brain/write', {
                method: 'PUT',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    dir: currentFile.dir,
                    file: currentFile.file,
                    content: textarea.value
                })
            }).then(function(r) {
                if (r.ok) {
                    editorStatus.textContent = '저장됨';
                    editorStatus.classList.add('saved');
                } else {
                    editorStatus.textContent = '저장 실패';
                }
            }).catch(function() {
                editorStatus.textContent = '저장 실패';
            });
        }

        backBtn.addEventListener('click', function() {
            clearTimeout(saveTimer);
            if (isEditing && editorStatus.textContent === '수정됨') {
                saveBrainFile();
            }
            currentFile = null;
            isEditing = false;
            editorView.style.display = 'none';
            treeView.style.display = 'flex';
        });

        // Send to Claude
        sendClaudeBtn.addEventListener('click', function() {
            var content = textarea.value.trim();
            if (!content) return;
            if (isEditing && editorStatus.textContent !== '저장됨') {
                clearTimeout(saveTimer);
                saveBrainFile();
            }
            fetch('/api/claude-sessions', { credentials: 'same-origin' })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var sessions = data.sessions || [];
                    var buttons = [];
                    sessions.forEach(function(s) {
                        buttons.push({
                            label: s.title,
                            style: 'secondary',
                            action: function() {
                                fetch('/api/claude-send', {
                                    method: 'POST', credentials: 'same-origin',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ target: s.target, text: content })
                                }).then(function(r) { if (r.ok) switchView('terminal'); });
                            }
                        });
                    });
                    buttons.push({
                        label: '+ 새 세션', style: 'primary',
                        action: function() {
                            fetch('/api/claude-new', {
                                method: 'POST', credentials: 'same-origin',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ text: content })
                            }).then(function(r) { if (r.ok) switchView('terminal'); });
                        }
                    });
                    buttons.push({ label: '취소', style: 'cancel' });
                    showConfirm(sessions.length ? '전송할 Claude 세션 (' + sessions.length + '개)' : '실행 중인 세션 없음', buttons);
                });
        });

        // --- Simple Markdown renderer ---
        function renderMarkdown(md) {
            if (!md) return '';
            var html = md
                // Escape HTML
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                // Code blocks (``` ... ```)
                .replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
                    return '<pre><code>' + code.replace(/\n$/, '') + '</code></pre>';
                })
                // Inline code
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                // Headers
                .replace(/^######\s+(.+)$/gm, '<h6>$1</h6>')
                .replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>')
                .replace(/^####\s+(.+)$/gm, '<h4>$1</h4>')
                .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
                .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
                .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
                // Bold & italic
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                // Horizontal rule
                .replace(/^---+$/gm, '<hr>')
                // Blockquote
                .replace(/^>\s+(.+)$/gm, '<blockquote>$1</blockquote>')
                // Links
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

            // Tables
            html = html.replace(/((?:^\|.+\|$\n?)+)/gm, function(tableBlock) {
                var rows = tableBlock.trim().split('\n').filter(function(r) { return r.trim(); });
                if (rows.length < 2) return tableBlock;
                // Check if second row is separator
                if (!/^\|[\s\-:|]+\|$/.test(rows[1])) return tableBlock;
                var headerCells = rows[0].split('|').filter(function(c) { return c.trim() !== ''; });
                var out = '<table><thead><tr>';
                headerCells.forEach(function(c) { out += '<th>' + c.trim() + '</th>'; });
                out += '</tr></thead><tbody>';
                for (var i = 2; i < rows.length; i++) {
                    var cells = rows[i].split('|').filter(function(c) { return c.trim() !== ''; });
                    out += '<tr>';
                    cells.forEach(function(c) { out += '<td>' + c.trim() + '</td>'; });
                    out += '</tr>';
                }
                out += '</tbody></table>';
                return out;
            });

            // Lists (simple)
            html = html.replace(/((?:^[\t ]*[-*]\s+.+$\n?)+)/gm, function(block) {
                var items = block.trim().split('\n');
                var out = '<ul>';
                items.forEach(function(item) {
                    out += '<li>' + item.replace(/^[\t ]*[-*]\s+/, '') + '</li>';
                });
                return out + '</ul>';
            });

            // Checkbox lists
            html = html.replace(/<li>\[x\]\s*/gi, '<li style="list-style:none">☑ ');
            html = html.replace(/<li>\[ \]\s*/gi, '<li style="list-style:none">☐ ');

            // Paragraphs — wrap remaining loose lines
            html = html.replace(/^(?!<[a-z/])((?!^\s*$).+)$/gm, '<p>$1</p>');
            // Clean up empty paragraphs
            html = html.replace(/<p>\s*<\/p>/g, '');

            return html;
        }

        function escapeHtml(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
    })();
    </script>
