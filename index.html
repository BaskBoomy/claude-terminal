<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Claude Terminal</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1815">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: #1a1815; color: #e8e6e3; overflow: hidden; visibility: hidden; }
        #app { display: flex; flex-direction: column; height: 100%; height: 100dvh; }
        #terminal-wrap { flex: 1; overflow: hidden; position: relative; }
        #terminal-frame { width: 100%; height: 100%; border: none; background: #1a1815; }
        .toolbar-row {
            display: flex; gap: 4px; padding: 4px 8px;
            background: #201d18; border-top: 1px solid #2a251d;
            overflow-x: auto; flex-shrink: 0;
        }
        .tool-btn {
            padding: 8px 12px; background: #2a251d; color: #e8e6e3;
            border: 1px solid #3a352b; border-radius: 6px;
            font-size: 13px; cursor: pointer; white-space: nowrap;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        .tool-btn:active { background: #3f3930; }
        .key-btn {
            padding: 5px 8px; background: #2a251d; color: #a09888;
            border: 1px solid #3a352b; border-radius: 4px;
            font-size: 11px; cursor: pointer; white-space: nowrap;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
            min-width: 28px; text-align: center; flex-shrink: 0;
        }
        .key-btn:active { background: #3f3930; color: #e8e6e3; }
        .key-btn.accent { background: #3a352b; color: #ff6b6b; border-color: #ff6b6b; }
        .sep { width: 1px; background: #3a352b; margin: 2px 2px; flex-shrink: 0; }
        #snippet-btns { display: contents; }
        .toolbar-row {
            max-height: 40px;
            transition: max-height 0.25s ease, opacity 0.25s ease, padding 0.25s ease;
            opacity: 1;
        }
        .toolbar-row.hidden {
            max-height: 0; opacity: 0; padding-top: 0; padding-bottom: 0;
            border-top-color: transparent; overflow: hidden;
        }
        #input-bar {
            display: flex; gap: 6px; padding: 8px 10px 48px;
            background: #201d18; border-top: 1px solid #2a251d; flex-shrink: 0;
            align-items: flex-end;
        }
        #input-bar:focus-within { padding-bottom: 8px; }
        #text-input {
            flex: 1; min-width: 0; padding: 8px 12px; background: #2a251d; color: #e8e6e3;
            border: 1px solid #3a352b; border-radius: 12px;
            font-size: 15px; outline: none; font-family: -apple-system, system-ui, sans-serif;
            resize: none; height: 38px; max-height: 120px; line-height: 1.5;
        }
        #text-input:focus { border-color: #C15F3C; }
        #text-input::placeholder { color: #6a6158; }
        .input-btn {
            width: 38px; height: 38px; padding: 0;
            background: #2a251d; color: #6a6158;
            border: 1px solid #3a352b; border-radius: 50%;
            font-size: 17px; cursor: pointer; touch-action: manipulation; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .input-btn:active { background: #3f3930; color: #e8e6e3; }
        .input-btn.primary {
            background: #C15F3C; color: #fff; border-color: #C15F3C;
            font-weight: bold; font-size: 16px;
        }
        .input-btn.primary:active { background: #A14A2F; }
        .input-btn.uploading { opacity: 0.5; pointer-events: none; }
        #file-input { display: none; }
        .fab-area {
            position: absolute; z-index: 20;
            display: flex; align-items: center; gap: 6px;
            pointer-events: none;
        }
        .fab-area > * { pointer-events: auto; }
        .fab-area.bottom-right { right: 10px; bottom: 10px; }
        .fab-circle {
            width: 40px; height: 40px; border-radius: 50%; border: none;
            font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .fab-circle.green { background: #4caf50; color: #fff; }
        .fab-circle.green:active { background: #388e3c; }
        .fab-panel {
            display: none; gap: 4px; align-items: center;
            background: #201d18; border: 1px solid #2a251d;
            border-radius: 8px; padding: 4px 6px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }
        .fab-panel.open { display: flex; }
        .fab-panel .fab-btn {
            padding: 8px 10px; border-radius: 6px; border: 1px solid #3a352b;
            font-size: 13px; cursor: pointer; white-space: nowrap;
            background: #4caf50; color: #fff; border-color: #4caf50;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        .fab-panel .fab-btn:active { background: #388e3c; }
        .fab-sep { width: 1px; background: #3a352b; align-self: stretch; }
        .fab-panel .fab-btn.kill {
            background: #ff6b6b; color: #fff; border-color: #ff6b6b;
        }
        .fab-panel .fab-btn.kill:active { background: #ff5252; }
        #scroll-indicator {
            position: absolute; right: 2px; top: 10%; width: 4px; height: 30%;
            background: rgba(193,95,60,0.5); border-radius: 2px;
            opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 10;
        }
        #scroll-indicator.visible { opacity: 1; }
    </style>
</head>
<body>
    <div id="app">
        <div id="terminal-wrap">
            <iframe id="terminal-frame" src="/ttyd/"></iframe>
            <div id="scroll-indicator"></div>
            <div class="fab-area bottom-right" id="tmux-fab">
                <div class="fab-panel" id="tmux-fab-panel">
                    <button class="fab-btn kill" data-key="tmux-kill">&#x2715;</button>
                    <div class="fab-sep"></div>
                    <button class="fab-btn" data-key="tmux-new">+Win</button>
                    <button class="fab-btn" data-key="tmux-prev">&#x25C0;</button>
                    <button class="fab-btn" data-key="tmux-next">&#x25B6;</button>
                    <button class="fab-btn" data-key="tmux-list">List</button>
                    <div class="fab-sep"></div>
                    <button class="fab-btn" onclick="location.reload()">&#x21BB;</button>
                    <div class="fab-sep"></div>
                    <button class="fab-btn kill" id="logout-btn">&#x23FB;</button>
                </div>
                <button class="fab-circle green" id="tmux-fab-toggle">&#x2261;</button>
            </div>
        </div>
        <div class="toolbar-row hidden" id="toolbar">
            <span id="snippet-btns"></span>
            <button class="tool-btn" onclick="location.href='/settings.html'" style="font-size:15px">&#x2699;</button>
        </div>
        <div class="toolbar-row hidden" id="keys-bar">
            <button class="key-btn accent" data-key="ctrl-c">C-c</button>
            <button class="key-btn" data-key="enter">&#x23CE;</button>
            <button class="key-btn" data-key="tab">Tab</button>
            <button class="key-btn" data-key="esc">Esc</button>
            <button class="key-btn" data-key="space">&#x2423;</button>
            <div class="sep"></div>
            <button class="key-btn" data-key="up">&#x25B2;</button>
            <button class="key-btn" data-key="down">&#x25BC;</button>
            <button class="key-btn" data-key="left">&#x25C0;</button>
            <button class="key-btn" data-key="right">&#x25B6;</button>
            <div class="sep"></div>
            <button class="key-btn" data-key="ctrl-d">C-d</button>
            <button class="key-btn" data-key="y">Y</button>
            <button class="key-btn" data-key="n">N</button>
        </div>
        <div id="input-bar">
            <button id="img-btn" class="input-btn">&#x1F4CE;</button>
            <input id="file-input" type="file" accept="image/*">
            <textarea id="text-input" rows="1" placeholder="입력 후 Shift+Enter..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
            <button id="send-btn" class="input-btn primary">&#x23CE;</button>
            <button id="toolbar-toggle" class="input-btn">&#x25B2;</button>
        </div>
    </div>
    <script>
    (function() {
        // --- Auth check ---
        function onUnauthorized() { window.location.href = '/login.html'; }
        fetch('/api/auth/check')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (!data.authenticated) return onUnauthorized();
                document.body.style.visibility = 'visible';
            })
            .catch(function() { onUnauthorized(); });

        // --- Logout ---
        document.getElementById('logout-btn').addEventListener('click', function() {
            fetch('/api/auth/logout', { method: 'POST' })
                .then(function() { onUnauthorized(); })
                .catch(function() { onUnauthorized(); });
        });

        // --- Wrap fetch to handle 401 globally ---
        var _origFetch = window.fetch;
        window.fetch = function() {
            return _origFetch.apply(this, arguments).then(function(resp) {
                if (resp.status === 401 && resp.url && resp.url.indexOf('/api/auth/') === -1) {
                    onUnauthorized();
                }
                return resp;
            });
        };

        var frame = document.getElementById('terminal-frame');
        var textInput = document.getElementById('text-input');
        var sendBtn = document.getElementById('send-btn');
        var imgBtn = document.getElementById('img-btn');
        var fileInput = document.getElementById('file-input');
        var inputHistory = [];
        var historyIndex = -1;

        function autoResize() {
            textInput.style.height = 'auto';
            textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
        }

        // --- Persist input text across page navigation ---
        var savedInput = sessionStorage.getItem('terminal-input');
        if (savedInput) textInput.value = savedInput;
        textInput.addEventListener('input', function() {
            sessionStorage.setItem('terminal-input', textInput.value);
            autoResize();
        });

        // Snippet color map
        var SNIPPET_COLORS = {
            'default': { bg: '#2a251d', fg: '#e8e6e3', border: '#3a352b' },
            'green':   { bg: '#4caf50', fg: '#1a1815', border: '#4caf50' },
            'blue':    { bg: '#C15F3C', fg: '#1a1815', border: '#C15F3C' },
            'red':     { bg: '#ff6b6b', fg: '#1a1815', border: '#ff6b6b' },
            'yellow':  { bg: '#f9e2af', fg: '#1a1815', border: '#f9e2af' },
            'purple':  { bg: '#cba6f7', fg: '#1a1815', border: '#cba6f7' },
            'teal':    { bg: '#388e3c', fg: '#1a1815', border: '#388e3c' }
        };

        // --- Load settings ---
        fetch('/api/settings')
            .then(function(r) { return r.json(); })
            .then(function(settings) {
                renderSnippets(settings.snippets || []);
                applyGeneral(settings.general || {});
            })
            .catch(function() {});

        function renderSnippets(snippets) {
            var container = document.getElementById('snippet-btns');
            container.innerHTML = '';
            snippets.forEach(function(sn) {
                var btn = document.createElement('button');
                btn.className = 'tool-btn';
                btn.textContent = sn.label;
                var colors = SNIPPET_COLORS[sn.color] || SNIPPET_COLORS['default'];
                btn.style.background = colors.bg;
                btn.style.color = colors.fg;
                btn.style.borderColor = colors.border;
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (sn.confirm && !confirm('Run: ' + sn.command + '?')) return;
                    sendText(sn.command + '\r');
                });
                container.appendChild(btn);
            });
        }

        function applyGeneral(general) {
            // Font size
            if (general.fontSize && general.fontSize !== 16) {
                textInput.style.fontSize = general.fontSize + 'px';
            }
            // Wake Lock
            if (general.wakeLock && 'wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(function() {});
                // Re-acquire on visibility change
                document.addEventListener('visibilitychange', function() {
                    if (document.visibilityState === 'visible' && general.wakeLock) {
                        navigator.wakeLock.request('screen').catch(function() {});
                    }
                });
            }
        }

        // Unregister old service worker if any
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
                regs.forEach(function(r) { r.unregister(); });
            });
        }

        // --- Find xterm.js hidden textarea inside iframe ---
        function getTA() {
            try {
                return frame.contentDocument.querySelector('.xterm-helper-textarea') ||
                       frame.contentDocument.querySelector('textarea');
            } catch(e) { return null; }
        }

        // --- Send text via input event ---
        function sendText(text) {
            var ta = getTA();
            if (!ta) return false;
            ta.value = '';
            ta.value = text;
            ta.dispatchEvent(new InputEvent('input', {
                data: text, inputType: 'insertText', bubbles: true
            }));
            ta.value = '';
            return true;
        }

        // --- Send special key via keydown event ---
        function sendKey(key, keyCode, mods) {
            var ta = getTA();
            if (!ta) return false;
            ta.dispatchEvent(new KeyboardEvent('keydown', {
                key: key, keyCode: keyCode, which: keyCode,
                bubbles: true, cancelable: true,
                ctrlKey: !!(mods && mods.ctrl),
                altKey: !!(mods && mods.alt),
                shiftKey: !!(mods && mods.shift)
            }));
            return true;
        }

        // --- tmux prefix (Ctrl+B) then command key ---
        function tmuxCmd(cmdKey, cmdKeyCode) {
            sendKey('b', 66, {ctrl: true});
            setTimeout(function() {
                sendKey(cmdKey, cmdKeyCode);
            }, 50);
        }

        // --- Toolbar key actions ---
        var KEYS = {
            'ctrl-c':    function() { sendKey('c', 67, {ctrl: true}); },
            'ctrl-d':    function() { sendKey('d', 68, {ctrl: true}); },
            'enter':     function() { sendKey('Enter', 13); },
            'tab':       function() { sendKey('Tab', 9); },
            'up':        function() { sendKey('ArrowUp', 38); },
            'down':      function() { sendKey('ArrowDown', 40); },
            'left':      function() { sendKey('ArrowLeft', 37); },
            'right':     function() { sendKey('ArrowRight', 39); },
            'esc':       function() { sendKey('Escape', 27); },
            'space':     function() { sendText(' '); },
            'y':         function() { sendText('y'); },
            'n':         function() { sendText('n'); },
            'tmux-new':  function() { tmuxCmd('c', 67); },
            'tmux-prev': function() { tmuxCmd('p', 80); },
            'tmux-next': function() { tmuxCmd('n', 78); },
            'tmux-list': function() { tmuxCmd('w', 87); },
            'tmux-kill': function() { tmuxCmd('&', 55); }
        };

        // --- Image upload ---
        function uploadImage(file) {
            imgBtn.classList.add('uploading');
            fetch('/upload', {
                method: 'POST',
                headers: { 'Content-Type': file.type || 'image/png' },
                body: file
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var cur = textInput.value;
                textInput.value = cur ? cur + ' ' + data.path : data.path;
            })
            .catch(function() {
                textInput.value += '[upload failed]';
            })
            .finally(function() {
                imgBtn.classList.remove('uploading');
                fileInput.value = '';
            });
        }

        imgBtn.addEventListener('click', function() { fileInput.click(); });

        fileInput.addEventListener('change', function() {
            if (fileInput.files[0]) uploadImage(fileInput.files[0]);
        });

        // --- Paste image from clipboard ---
        textInput.addEventListener('paste', function(e) {
            var items = e.clipboardData && e.clipboardData.items;
            if (!items) return;
            for (var i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image/') === 0) {
                    e.preventDefault();
                    uploadImage(items[i].getAsFile());
                    return;
                }
            }
        });

        // --- Input bar ---
        function submitInput() {
            var text = textInput.value;
            sendText(text || '');
            setTimeout(function() {
                sendKey('Enter', 13);
            }, 50);
            if (text) inputHistory.push(text);
            if (inputHistory.length > 50) inputHistory.shift();
            historyIndex = -1;
            textInput.value = '';
            textInput.style.height = '38px';
            sessionStorage.removeItem('terminal-input');
        }

        textInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.shiftKey && !e.isComposing) {
                e.preventDefault();
                submitInput();
            } else if (e.key === 'ArrowUp' && !e.isComposing && document.activeElement === textInput) {
                if (inputHistory.length > 0 && historyIndex < inputHistory.length - 1) {
                    e.preventDefault();
                    historyIndex++;
                    textInput.value = inputHistory[inputHistory.length - 1 - historyIndex];
                    autoResize();
                }
            } else if (e.key === 'ArrowDown' && !e.isComposing && document.activeElement === textInput) {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    textInput.value = inputHistory[inputHistory.length - 1 - historyIndex];
                } else {
                    historyIndex = -1;
                    textInput.value = '';
                }
                autoResize();
            }
        });

        sendBtn.addEventListener('click', function() {
            submitInput();
            setTimeout(function() { textInput.blur(); }, 100);
        });

        // --- Toolbar buttons ---
        function bindToolbarButtons() {
            document.querySelectorAll('[data-key]').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    var action = KEYS[btn.dataset.key];
                    if (action) action();
                });
            });
        }
        bindToolbarButtons();

        // Prevent any button/key-btn from opening keyboard
        document.addEventListener('touchend', function(e) {
            var t = e.target;
            if (t.tagName === 'BUTTON' || t.classList.contains('key-btn') || t.classList.contains('tool-btn') || t.classList.contains('fab-btn') || t.classList.contains('fab-circle')) {
                document.activeElement && document.activeElement.blur && document.activeElement !== document.body && document.activeElement.blur();
            }
        });

        // --- Toolbar toggle ---
        var toolbarToggle = document.getElementById('toolbar-toggle');
        var toolbar = document.getElementById('toolbar');
        var keysBar = document.getElementById('keys-bar');
        var toolbarsOpen = sessionStorage.getItem('toolbars-open') === '1';

        function setToolbars(open) {
            toolbarsOpen = open;
            toolbar.classList.toggle('hidden', !open);
            keysBar.classList.toggle('hidden', !open);
            toolbarToggle.innerHTML = open ? '\u25BC' : '\u25B2';
            sessionStorage.setItem('toolbars-open', open ? '1' : '0');
        }
        setToolbars(toolbarsOpen);

        toolbarToggle.addEventListener('click', function(e) {
            e.preventDefault();
            setToolbars(!toolbarsOpen);
        });

        // --- Floating tmux FAB ---
        var tmuxFabToggle = document.getElementById('tmux-fab-toggle');
        var tmuxFabPanel = document.getElementById('tmux-fab-panel');
        tmuxFabToggle.addEventListener('click', function(e) {
            e.preventDefault();
            tmuxFabPanel.classList.toggle('open');
        });
        // Close panel when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('#tmux-fab')) {
                tmuxFabPanel.classList.remove('open');
            }
        });
        // Close panel on iframe focus (terminal click)
        window.addEventListener('blur', function() {
            tmuxFabPanel.classList.remove('open');
        });

        // --- Mobile touch scroll support ---
        var scrollIndicator = document.getElementById('scroll-indicator');
        var scrollFadeTimer = null;

        function showScrollIndicator() {
            scrollIndicator.classList.add('visible');
            clearTimeout(scrollFadeTimer);
            scrollFadeTimer = setTimeout(function() {
                scrollIndicator.classList.remove('visible');
            }, 800);
        }

        function emitScroll(direction) {
            var dispatched = false;
            try {
                var viewport = frame.contentDocument.querySelector('.xterm-viewport');
                if (viewport) {
                    viewport.dispatchEvent(new WheelEvent('wheel', {
                        deltaY: direction === 'up' ? -100 : 100,
                        bubbles: true, cancelable: true
                    }));
                    dispatched = true;
                }
            } catch(e) {}
            // Fallback: send SGR mouse escape sequences if viewport not found
            if (!dispatched) {
                if (direction === 'up') {
                    sendText('\x1b[<64;1;1M');
                } else {
                    sendText('\x1b[<65;1;1M');
                }
            }
            showScrollIndicator();
        }

        function initTouchScroll() {
            var xtermScreen = null;
            try {
                xtermScreen = frame.contentDocument.querySelector('.xterm-screen');
            } catch(e) {}
            if (!xtermScreen) return false;

            var startX = 0;
            var startY = 0;
            var lastY = 0;
            var isScrolling = false;
            var isSwiping = false;
            var swipeHandled = false;
            var directionLocked = false;
            var accumulated = 0;
            var THRESHOLD = 10;   // min px to detect direction
            var STEP = 30;        // px per scroll line
            var SWIPE_MIN = 60;   // min px for swipe trigger

            xtermScreen.addEventListener('touchstart', function(e) {
                if (e.touches.length !== 1) return;
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                lastY = startY;
                isScrolling = false;
                isSwiping = false;
                swipeHandled = false;
                directionLocked = false;
                accumulated = 0;
            }, { passive: true });

            xtermScreen.addEventListener('touchmove', function(e) {
                if (e.touches.length !== 1) return;
                var currentX = e.touches[0].clientX;
                var currentY = e.touches[0].clientY;
                var deltaY = Math.abs(startY - currentY);
                var deltaX = Math.abs(currentX - startX);

                // Determine direction once past threshold
                if (!directionLocked && (deltaY > THRESHOLD || deltaX > THRESHOLD)) {
                    directionLocked = true;
                    isScrolling = deltaY > deltaX;
                    isSwiping = !isScrolling;
                    lastY = currentY;
                }

                if (isScrolling) {
                    e.preventDefault();
                    var delta = lastY - currentY;
                    accumulated += delta;
                    lastY = currentY;

                    while (Math.abs(accumulated) >= STEP) {
                        if (accumulated > 0) {
                            emitScroll('down');
                            accumulated -= STEP;
                        } else {
                            emitScroll('up');
                            accumulated += STEP;
                        }
                    }
                }

                // Horizontal swipe → tmux session switch
                if (isSwiping && !swipeHandled) {
                    var swipeDist = currentX - startX;
                    if (Math.abs(swipeDist) >= SWIPE_MIN) {
                        swipeHandled = true;
                        if (swipeDist < 0) {
                            tmuxCmd('n', 78); // swipe left → next
                        } else {
                            tmuxCmd('p', 80); // swipe right → prev
                        }
                    }
                }
            }, { passive: false });

            xtermScreen.addEventListener('touchend', function() {
                isScrolling = false;
                isSwiping = false;
                swipeHandled = false;
                directionLocked = false;
                accumulated = 0;
            }, { passive: true });

            return true;
        }

        // Attach touch scroll after iframe loads, with retry
        frame.addEventListener('load', function() {
            var attempts = 0;
            var tryInit = setInterval(function() {
                if (initTouchScroll() || ++attempts > 20) {
                    clearInterval(tryInit);
                }
            }, 250);
        });

        // --- Auto-reconnect on page visibility change ---
        var hiddenAt = 0;
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') {
                hiddenAt = Date.now();
                return;
            }
            // Reload iframe if away for 5+ seconds
            if (hiddenAt && Date.now() - hiddenAt > 5000) {
                frame.src = '/ttyd/';
            }
            hiddenAt = 0;
        });

        // --- Keyboard resize handling (iOS Safari fallback) ---
        var app = document.getElementById('app');
        if (window.visualViewport) {
            function onViewportResize() {
                app.style.height = window.visualViewport.height + 'px';
                app.style.transform = 'translateY(' + window.visualViewport.offsetTop + 'px)';
            }
            window.visualViewport.addEventListener('resize', onViewportResize);
            window.visualViewport.addEventListener('scroll', onViewportResize);
        }
    })();
    </script>
</body>
</html>
