<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Claude Terminal</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1815">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%; background: #1a1815; color: #e8e6e3;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        body {
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .login-card {
            width: 100%; max-width: 360px; text-align: center;
        }
        .logo {
            font-size: 48px; margin-bottom: 8px;
        }
        .title {
            font-size: 22px; font-weight: 700; margin-bottom: 4px;
            color: #e8e6e3;
        }
        .subtitle {
            font-size: 13px; color: #6a6158; margin-bottom: 32px;
        }
        .input-group {
            position: relative; margin-bottom: 16px;
        }
        .input-group input {
            width: 100%; padding: 14px 48px 14px 16px;
            background: #2a251d; color: #e8e6e3;
            border: 1px solid #3a352b; border-radius: 12px;
            font-size: 16px; outline: none;
            font-family: inherit;
        }
        .input-group input:focus {
            border-color: #C15F3C;
        }
        .input-group input::placeholder {
            color: #6a6158;
        }
        .toggle-pw {
            position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
            width: 40px; height: 40px; background: none; border: none;
            color: #6a6158; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .toggle-pw:active { color: #e8e6e3; }
        .login-btn {
            width: 100%; padding: 14px;
            background: #C15F3C; color: #fff; border: none;
            border-radius: 12px; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: background 0.15s;
        }
        .login-btn:active { background: #A14A2F; }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg {
            margin-top: 12px; padding: 10px 14px;
            background: rgba(255,107,107,0.12); color: #ff6b6b;
            border-radius: 8px; font-size: 14px;
            display: none;
        }
        .error-msg.show { display: block; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">&#x1F4BB;</div>
        <div class="title">Claude Terminal</div>
        <div class="subtitle">Access requires authentication</div>
        <form id="login-form">
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" autocomplete="current-password" autofocus>
                <button type="button" class="toggle-pw" id="toggle-pw">&#x1F441;</button>
            </div>
            <button type="submit" class="login-btn" id="login-btn">Login</button>
        </form>
        <div class="error-msg" id="error-msg"></div>
    </div>
    <script>
    (function() {
        var form = document.getElementById('login-form');
        var pwInput = document.getElementById('password');
        var togglePw = document.getElementById('toggle-pw');
        var loginBtn = document.getElementById('login-btn');
        var errorMsg = document.getElementById('error-msg');

        // Check if already authenticated
        fetch('/api/auth/check')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.authenticated) window.location.href = '/';
            })
            .catch(function() {});

        togglePw.addEventListener('click', function() {
            var isPassword = pwInput.type === 'password';
            pwInput.type = isPassword ? 'text' : 'password';
            togglePw.innerHTML = isPassword ? '&#x1F648;' : '&#x1F441;';
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            var password = pwInput.value.trim();
            if (!password) {
                showError('Please enter a password');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            errorMsg.classList.remove('show');

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: password })
            })
            .then(function(r) {
                return r.json().then(function(data) {
                    return { status: r.status, data: data };
                });
            })
            .then(function(result) {
                if (result.status === 200 && result.data.ok) {
                    window.location.href = '/';
                } else if (result.status === 429) {
                    showError(result.data.error || 'Too many attempts');
                } else {
                    showError(result.data.error || 'Login failed');
                    pwInput.value = '';
                    pwInput.focus();
                }
            })
            .catch(function() {
                showError('Network error');
            })
            .finally(function() {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            });
        });
    })();
    </script>
</body>
</html>
